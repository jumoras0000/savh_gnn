name: CI

# Vérifie lint + tests à chaque push / PR. Empêche les régressions de partir sur main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Projet_Panacee

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies (légères ; pas de torch-geometric / deepchem)
        run: |
          python -m pip install --upgrade pip
          # PyTorch CPU (suffit pour tester le chargement sécurisé des checkpoints)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Backend + chimie + outils de test
          pip install starlette "uvicorn" httpx numpy rdkit scikit-learn pandas
          pip install ruff pytest

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        env:
          PYTHONIOENCODING: utf-8
        run: pytest tests/ -q
